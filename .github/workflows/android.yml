name: Build APK Otomatis

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode Proyek
      uses: actions/checkout@v4

    - name: Siapkan Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Pasang Java Resmi (Wajib untuk Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Pasang Android SDK & Setujui Lisensi Secara Otomatis
      uses: android-actions/setup-android@v3

    - name: Instal Alat Pendukung Linux
      run: |
        sudo apt update
        sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip install --upgrade pip
        pip install cython buildozer

    - name: Proses Merakit APK (Buildozer)
      run: |
        # Kita buat folder tujuan buildozer, lalu kita hubungkan (symlink) 
        # ke Android SDK resmi yang sudah lolos lisensi di atas tadi.
        mkdir -p ~/.buildozer/android/platform/
        ln -s $ANDROID_HOME ~/.buildozer/android/platform/android-sdk
        
        # Jalankan rakitan dengan aman
        buildozer android debug

    - name: Simpan APK Jadi Ke GitHub
      uses: actions/upload-artifact@v4
      with:
        name: APK-Matang-Anda
        path: bin/*.apk
