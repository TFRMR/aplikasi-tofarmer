name: Build APK Otomatis

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode Proyek
      uses: actions/checkout@v4

    - name: Siapkan Lingkungan Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instal Alat Pendukung & Java
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip install --upgrade pip
        pip install buildozer cython

    - name: Ambil Android SDK/NDK Otomatis
      run: |
        buildozer android || true

    - name: Proses Merakit APK (Buildozer)
      run: |
        buildozer android debug

    - name: Simpan APK Jadi Ke GitHub
      uses: actions/upload-artifact@v4
      with:
        name: APK-Matang-Anda
        path: bin/*.apk
